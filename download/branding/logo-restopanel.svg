<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A059"/>
      <stop offset="50%" style="stop-color:#e3c987"/>
      <stop offset="100%" style="stop-color:#9a7d3e"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Logo icon (utensils crossed in a rounded square) -->
  <rect x="10" y="20" width="80" height="80" rx="20" fill="url(#gold)"/>
  <!-- Fork -->
  <path d="M35 35 L35 55 M40 35 L40 50 M45 35 L45 50 M37.5 50 L37.5 85" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knife -->
  <path d="M60 35 C58 35 55 38 55 45 L55 55 L62 55 L62 85" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M60 35 C62 35 65 38 65 45 L65 55 L60 55" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Text -->
  <text x="105" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f5f5f0" letter-spacing="-1">Resto<tspan fill="url(#gold)">Panel</tspan></text>
  <text x="106" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#a1a1aa" letter-spacing="2">SOFTWARE DE GESTIÓN · HOSTELERÍA</text>
</svg>
