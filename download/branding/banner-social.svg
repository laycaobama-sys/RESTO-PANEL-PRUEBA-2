<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d1410"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5A059"/>
      <stop offset="50%" style="stop-color:#e3c987"/>
      <stop offset="100%" style="stop-color:#9a7d3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C5A059;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C5A059;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="400" fill="url(#glow)"/>

  <!-- Logo -->
  <rect x="100" y="180" width="80" height="80" rx="20" fill="url(#gold)"/>
  <path d="M125 195 L125 215 M130 195 L130 210 M135 195 L135 210 M127.5 210 L127.5 245" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M150 195 C148 195 145 198 145 205 L145 215 L152 215 L152 245" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M150 195 C152 195 155 198 155 205 L155 215 L150 215" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Title -->
  <text x="200" y="230" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#f5f5f0" letter-spacing="-1">Resto<tspan fill="url(#gold)">Panel</tspan></text>
  <text x="202" y="255" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#a1a1aa" letter-spacing="3">SOFTWARE DE GESTIÓN PARA HOSTELERÍA</text>

  <!-- Tagline -->
  <text x="100" y="340" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#f5f5f0">Llena más mesas.</text>
  <text x="100" y="385" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#f5f5f0">Pierde menos reservas.</text>
  <text x="100" y="430" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="url(#gold)">Conoce a cada cliente.</text>

  <!-- Features -->
  <text x="100" y="490" font-family="system-ui, sans-serif" font-size="14" fill="#a1a1aa">Reservas multicanal · CRM propio · Plano de mesas · Sin comisiones por reserva</text>

  <!-- CTA -->
  <rect x="100" y="520" width="200" height="50" rx="12" fill="url(#gold)"/>
  <text x="200" y="552" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#0a0a0a" text-anchor="middle">restopanel.com</text>
</svg>
